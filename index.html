<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightOwl</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #131313;
  --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.07);
  --text: #f0ece6;
  --muted: rgba(240,236,230,0.4);
  --dim: rgba(240,236,230,0.15);
  --amber: #f0a430;
  --amber-dim: rgba(240,164,48,0.12);
  --amber-glow: rgba(240,164,48,0.2);
  --red: #e05a5a;
  --green: #5acd8a;
  --blue: #5aaae0;
  --font: 'Nunito', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

/* PHONE FRAME */
.phone {
  width: 100%;
  max-width: 390px;
  min-height: 720px;
  background: var(--surface);
  border-radius: 44px;
  border: 1.5px solid rgba(255,255,255,0.08);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
}

/* NOTCH */
.notch {
  width: 120px;
  height: 28px;
  background: var(--bg);
  border-radius: 0 0 18px 18px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-shrink: 0;
}

.notch-cam {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #1e1e1e;
  border: 1.5px solid #2a2a2a;
}

/* SCREENS */
.screen {
  flex: 1;
  display: none;
  flex-direction: column;
  padding: 0 28px 36px;
  animation: slideUp 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
.screen.active { display: flex; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── SCREEN 1: INPUT ── */
.app-icon {
  font-size: 52px;
  text-align: center;
  margin: 24px 0 6px;
  filter: drop-shadow(0 0 20px var(--amber-glow));
}

.app-title {
  font-size: 28px;
  font-weight: 900;
  text-align: center;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.app-sub {
  font-size: 13px;
  font-weight: 400;
  text-align: center;
  color: var(--muted);
  margin-bottom: 32px;
}

.time-card {
  background: var(--surface2);
  border-radius: 22px;
  padding: 20px 22px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
}

.tc-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tc-label span { font-size: 14px; }

.tc-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 32px;
  font-weight: 800;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 1px;
  -webkit-appearance: none;
  color-scheme: dark;
}

.tc-input:focus {
  border-color: var(--amber);
}

.days-row {
  background: var(--surface2);
  border-radius: 22px;
  padding: 18px 22px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
}

.days-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.days-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.day-pill {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}

.day-pill.active {
  background: var(--amber);
  color: #0a0a0a;
  border-color: var(--amber);
}


.cta-btn {
  width: 100%;
  background: var(--amber);
  border: none;
  border-radius: 20px;
  color: #0a0a0a;
  font-family: var(--font);
  font-size: 17px;
  font-weight: 800;
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}

.cta-btn:hover { opacity: 0.9; transform: scale(0.99); }
.cta-btn:active { transform: scale(0.97); }

/* ── SCREEN 2: RESULT ── */
.result-top {
  padding-top: 20px;
  text-align: center;
  margin-bottom: 20px;
}

.result-emoji {
  font-size: 64px;
  display: block;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 24px var(--amber-glow));
}

.result-hours {
  font-size: 56px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 4px;
}

.result-hours-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* RATING BAR */
.rating-card {
  background: var(--surface2);
  border-radius: 22px;
  padding: 18px 20px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
}

.rating-label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.rating-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

.rating-badge {
  font-size: 12px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 20px;
}

.sleep-bar-track {
  height: 10px;
  background: rgba(255,255,255,0.06);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 8px;
}

.sleep-bar-fill {
  height: 100%;
  border-radius: 20px;
  width: 0%;
  transition: width 1s cubic-bezier(0.4,0,0.2,1);
}

.bar-markers {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  font-weight: 600;
  color: var(--dim);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat-card {
  background: var(--surface2);
  border-radius: 18px;
  padding: 14px 16px;
  border: 1px solid var(--border);
}

.sc-val {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 2px;
}

.sc-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ROAST CARD */
.roast-card {
  background: var(--amber-dim);
  border: 1.5px solid rgba(240,164,48,0.2);
  border-radius: 22px;
  padding: 18px 20px;
  margin-bottom: 20px;
}

.roast-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.roast-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.65;
}

.result-btns {
  display: flex;
  gap: 10px;
}

.rbtn {
  flex: 1;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 800;
  padding: 15px;
  border-radius: 18px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text);
}
.rbtn:hover { background: var(--surface); }

.rbtn-amber {
  background: var(--amber);
  color: #0a0a0a;
  border-color: var(--amber);
}
.rbtn-amber:hover { opacity: 0.9; }

@media (max-width: 440px) {
  .phone {
    border-radius: 32px;
    min-height: unset;
  }
  body { padding: 0; align-items: flex-start; }
  .phone { border-radius: 0; border: none; min-height: 100vh; }
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"><div class="notch-cam"></div></div>

  <!-- SCREEN 1: INPUT -->
  <div class="screen active" id="screen-input">
    <div class="app-icon">🦉</div>
    <div class="app-title">NightOwl</div>
    <div class="app-sub">be honest. when did you actually sleep?</div>

    <div class="time-card">
      <div class="tc-label"><span>😴</span> I went to sleep at</div>
      <input class="tc-input" type="time" id="sleepTime" value="00:30" />
    </div>

    <div class="time-card">
      <div class="tc-label"><span>☀️</span> I woke up at</div>
      <input class="tc-input" type="time" id="wakeTime" value="08:00" />
    </div>

    <div class="days-row">
      <div class="days-label">how many days this week?</div>
      <div class="days-pills">
        <button class="day-pill" onclick="setDays(1)">1</button>
        <button class="day-pill" onclick="setDays(2)">2</button>
        <button class="day-pill active" onclick="setDays(3)">3</button>
        <button class="day-pill" onclick="setDays(4)">4</button>
        <button class="day-pill" onclick="setDays(5)">5</button>
        <button class="day-pill" onclick="setDays(6)">6</button>
        <button class="day-pill" onclick="setDays(7)">7</button>
      </div>
    </div>

    <button class="cta-btn" onclick="analyze()">roast my sleep →</button>
  </div>

  <!-- SCREEN 2: RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-top">
      <span class="result-emoji" id="resultEmoji">😵</span>
      <div class="result-hours" id="resultHours">—</div>
      <div class="result-hours-label">hours of sleep</div>
    </div>

    <div class="rating-card">
      <div class="rating-label-row">
        <div class="rating-title">Sleep Score</div>
        <div class="rating-badge" id="ratingBadge">—</div>
      </div>
      <div class="sleep-bar-track">
        <div class="sleep-bar-fill" id="sleepBarFill"></div>
      </div>
      <div class="bar-markers">
        <span>0h</span><span>4h</span><span>6h</span><span>8h</span><span>10h+</span>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="sc-val" id="statBedtime">—</div>
        <div class="sc-label">Bedtime</div>
      </div>
      <div class="stat-card">
        <div class="sc-val" id="statWake">—</div>
        <div class="sc-label">Wake time</div>
      </div>
      <div class="stat-card">
        <div class="sc-val" id="statDebt">—</div>
        <div class="sc-label">Weekly debt</div>
      </div>
      <div class="stat-card">
        <div class="sc-val" id="statType">—</div>
        <div class="sc-label">Sleep type</div>
      </div>
    </div>

    <div class="roast-card">
      <div class="roast-label">🔥 the verdict</div>
      <div class="roast-text" id="roastText">—</div>
    </div>

    <div class="result-btns">
      <button class="rbtn" onclick="goBack()">← redo</button>
      <button class="rbtn rbtn-amber" onclick="copyRoast()">copy roast</button>
    </div>
  </div>
</div>

<script>
let selectedDays = 3;
